<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TakaGon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #0f9d58, #34d399);
  color: white;
  text-align: center;
}

/* HERO */
.hero {
  padding: 60px 20px;
}

.hero img {
  width: 100px;
  border-radius: 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-size: 42px;
  margin-top: 15px;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0.9;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 14px 28px;
  background: white;
  color: #0f9d58;
  font-weight: bold;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  background: #eafff3;
}

/* FEATURES */
.features {
  padding: 40px 20px;
}

.feature-box {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

/* SCREENSHOTS */
.screenshots {
  padding: 40px 20px;
}

.screenshots img {
  width: 200px;
  margin: 10px;
  border-radius: 15px;
}

/* FOOTER */
.footer {
  padding: 20px;
  font-size: 14px;
  opacity: 0.8;
}

/* MOBILE */
@media(max-width:600px){
  h1 { font-size: 30px; }
  .screenshots img { width: 150px; }
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="Images/TakaGon-v1.0-icon.png">
  <h1>💰 TakaGon</h1>
  <p class="subtitle">Smart Cash Calculator for Bangladesh 🇧🇩</p>

  <a class="btn" href="https://github.com/currentvai/TakaGon/releases">
    Download APK
  </a>
</div>

<!-- FEATURES -->
<div class="features">
  <h2>🚀 Features</h2>

  <div class="feature-box">
    <div class="card">⚡ Fast Calculation</div>
    <div class="card">🎯 Simple UI</div>
    <div class="card">🇧🇩 Bangladesh Focused</div>
    <div class="card">📱 Lightweight</div>
  </div>
</div>

<!-- SCREENSHOTS -->
<div class="screenshots">
  <h2>📸 App Preview</h2>

  <img src="Images/Screenshot1_TakaGon-v1.0-.png">
  <img src="Images/Screenshot2_TakaGon-v1.0.png">
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 TakaGon | Developed by Current Vai
</div>

</body>
</html>
